tagline: Trade sports, politics, & more
description: |
  Polymarket is a prediction market where people trade on the outcomes of real-world events across sports, politics, news, tech, and culture. Prices track the odds — buy shares in an outcome you believe in for as little as a few cents, trade out at any time, or hold to settlement and cash in if you're right.

  The app brings live in-game trading, real-time prices, the tightest spreads, and instant cash-outs to iPhone and Android. Polymarket is CFTC-regulated and available to adults across the United States.
