name: THERMIK Pro
developer: N3xt GmbH
tagline: The digital paragliding magazine
description: |
  THERMIK Pro is the digital edition of THERMIK magazine, a leading paragliding publication for over 25 years. The app provides instant access to all current and archived issues, with full offline reading support.

  Content includes in-depth product tests of paragliders, harnesses, reserve parachutes, and instruments, alongside cross-country flight reports, interviews with pilots and developers, and concise weather and safety coverage. The reading experience features crystal-clear PDF rendering, a clear table of contents, fast article navigation, and page thumbnails.
