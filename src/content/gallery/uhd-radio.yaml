name: UHD Radio
developer: Emmers Ventures Ltd.
tagline: Ultra-high-fidelity internet radio at very low bitrates
description: |
  UHD Radio features five radio stations streaming with xHE-AAC, an advanced audio codec that delivers high-fidelity sound at impossibly low bitrates — 48 kbps for mobile use, plus 128 kbps and 320 kbps options for the highest audio quality. The HLS streams synchronize album art and ID tags with the music for a polished, cohesive listening experience.

  The Android version is built with Skip from the same Swift codebase as the iOS app, using ExoPlayer for the underlying media playback. The author shipped the Android port at just 13 MB.
