name: CatCoach
developer: TWOBIRDSTALK STUDIO
tagline: Can you outsmart your cat?
description: |
  CatCoach is a fast-paced trivia-style game where you play the cat whisperer, solving everyday feline mischief like knocking over vases, stealing food, or ignoring your voice. Each of the 20 bite-sized levels asks you to choose the right action under a timer, with funny reactions and outcomes for every choice.

  Earn stars, unlock praise from your cat, and test how well you really understand feline logic. Available in English and Ukrainian, ad-supported with an optional premium subscription.
