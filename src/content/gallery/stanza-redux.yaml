# PROVENANCE
# - Skip-built: open-source App Fair Project app — repo
#   Stanza-Redux/Stanza-Redux. Package.swift depends on
#   `https://source.skip.tools/skip.git` and ships the SkipStone build plugin.
#   https://github.com/Stanza-Redux/Stanza-Redux
# - Skip mode: SkipLite — both modules' Sources/<module>/Skip/skip.yml omit
#   `mode: 'native'` (and Skip's convention is that the absence of that
#   setting means the module is transpiled). Package.swift uses `skip-ui` and
#   `skip-model`, not `skip-fuse-ui` / `skip-fuse`. The Readium SDK is brought
#   in as a Kotlin Gradle dependency on the Android side and as the Swift
#   `swift-toolkit` package on iOS.
name: Stanza Redux
developer: The App Fair Project Inc
tagline: A free open-source ebook reader for iOS and Android
description: |
  Stanza Redux is a free, open-source EPUB reader that brings your ebook library to life on both iOS and Android. Import books from your device, browse and download titles from public-domain catalogs like Standard Ebooks and Project Gutenberg, and read with customizable typography, themes, and bookmarks.

  A revival of the classic Stanza ebook reader, built from a single Swift codebase using Skip Lite. The Readium toolkit is wired in via platform-specific bindings — Swift package on iOS, Kotlin Gradle dependency on Android.
category: Books
mode: SkipLite
releaseYear: 2026
tags:
