# PROVENANCE
# - Skip-built: confirmed by the developer (Tom Lake) in a message to the Skip
#   team
# - Skip mode: not specified by the developer; omitted so no mode badge is
#   rendered in the gallery card. The iOS app was fully rebuilt in SwiftUI
#   before being brought to Android via Skip, with a single native Android
#   feature (2D Replay) supplementing the cross-platform Swift codebase.
# - Source: not public; the iOS app is a long-standing closed-source product
#   (released August 2018) and the Android port was shipped in 2026.
name: Stats Tracker for PUBG
developer: Tom Lake
tagline: PUBG stats and match analytics for Xbox, PlayStation, and PC players
description: |
  Stats Tracker for PUBG is a companion app for casual and competitive PUBG players on Xbox, PlayStation, and PC. Track wins, kills, K/D ratios, weapon accuracy, loot usage, and match-by-match breakdowns; view season and lifetime stats; and review detailed results for every recent match. Other features include live loot loadout tracking, a redesigned match list, per-weapon accuracy, Team Deathmatch round-by-round results, friend comparisons, and a 2D match replay tool.

  Originally released for iOS in 2018 as a UIKit/Storyboards app, Stats Tracker for PUBG was fully rebuilt in SwiftUI and brought to Android seven years later via Skip from the same Swift codebase. The 2D Replay view is the only feature implemented natively for Android; everything else is shared cross-platform.
