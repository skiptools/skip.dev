# PROVENANCE
# - Skip-built: open-source third-party app — repo
#   fromkk/PhotoExhibition-skip. README: "The photo exhibition app with
#   skip.tools... transpiled to Kotlin so that the app can run natively on
#   iOS and Android." https://github.com/fromkk/PhotoExhibition-skip
# - Skip mode: SkipLite — Sources/PhotoExhibition/Skip/skip.yml has no
#   mode setting, and Sources/PhotoExhibitionModel/Skip/skip.yml has its
#   `mode: 'native'` and `bridging: true` lines explicitly commented out
#   (i.e., the project is currently configured as transpiled). The
#   Package.swift does pull in both `skip-ui` and `skip-fuse`, but per the
#   active skip.yml configuration the build is Skip Lite.
name: exhivision
developer: Kazuya Ueoka
tagline: Your own photo exhibition in the palm of your hand
description: |
  exhivision is an "online exhibition space" designed especially for people who love taking and viewing photographs. Unlike social media, exhivision lets you focus purely on your photographs — free from distractions, comments, and noise.

  The app makes it easy to curate and host a personal photo exhibition for friends or the public, with Firebase-backed authentication, storage, and sharing. Built from a single Swift codebase that ships natively to both iOS and Android with Skip.
category: Photo & Video
mode: SkipLite
releaseYear: 2025
tags:
  - Photography
  - Firebase
  - Curation
