# PROVENANCE
# - Skip-built: the ServiceM8 Lite Android app uses Play Store package
#   `com.servicem8.skip` — the `.skip` suffix is the convention ServiceM8
#   chose to distinguish their Skip-built Android companion from the older
#   native-Kotlin app. (The `.skip` suffix is a developer-chosen tag, not a
#   Skip-defined convention; the ServiceM8 case is the strongest example.)
# - Skip mode: not publicly disclosed. The Android app is closed-source so
#   no skip.yml is observable. Mode is omitted here.
name: ServiceM8
developer: ServiceM8 (Eroldawn Pty Ltd)
tagline: Job management for trade contractors and field service teams
description: |
  ServiceM8 is job-management software for trade contractors and home-service businesses, including plumbers, electricians, HVAC, locksmiths, cleaners, and gardeners. The full iOS and iPad app handles digital job cards, scheduling, quotes, on-the-way texts, electronic signatures, time tracking, invoicing, online payments, custom forms, and asset history, with Xero and QuickBooks Online integrations.

  ServiceM8 Lite for Android is the Skip-built companion designed for field staff, subcontractors, and temporary workers who only need the essentials — schedule, job cards, checklists, navigation, photos, and notes — without the full management surface.
