name: "IntelliCharge"
developer: Grid Elevated
tagline: Smart EV charging that balances grid load and renewable supply
description: |
  IntelliCharge is the mobile app for Grid Elevated's smart EV charging network. Drivers arrive at a station, scan its QR code, and submit a charge request with their current state-of-charge and intended departure time. The platform then throttles power delivery across active vehicles to balance grid load and renewable supply. Live progress and the projected end-of-charge state are visible on the app dashboard.

  Grid Elevated is a University of Utah spinout focused on grid modernization, with EV charging among its consumer-facing products.
