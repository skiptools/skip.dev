name: DomainQuery
developer: Ahnaf Mahmud
tagline: DNS, RDAP and WHOIS lookup at your fingertips
description: |
  DomainQuery lets you check DNS records for any domain and view RDAP and WHOIS data for registration details, contacts, and registrar info from a single iOS or Android lookup tool. The interface is built for fast repeated lookups, and the app gracefully handles TLDs where RDAP is unavailable or WHOIS data is restricted.

  A practical utility for developers, sysadmins, and anyone managing or investigating domains. Available on both iOS and Android with the same interface and feature set.
