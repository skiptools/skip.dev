name: "MediQuo Medical Chat"
developer: Medipremium
tagline: 24/7 chat with licensed doctors across dozens of medical specialties
description: |
  MediQuo is a telemedicine app from Barcelona-based Medipremium that connects users with licensed healthcare professionals through real-time chat. Specialists cover gynecology, pediatrics, general medicine, psychology, nutrition, dermatology, cardiology, urology, and more.

  Users can send photos, video, lab results, and clinical reports directly to specialists, and a Premium subscription unlocks unlimited consultations across the full panel of doctors. The app is widely used across Spain and Latin America, with over a million Play Store installs.
