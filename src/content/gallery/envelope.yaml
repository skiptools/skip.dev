name: Envelope
developer: Envelope Money, Inc.
tagline: Envelope budgeting with built-in checking and debit cards
description: |
  Envelope is a budgeting app with built-in checking and debit cards — like YNAB or Monarch if it were also your bank. It is built for people who want their budget to control spending before it happens, not just track transactions after the money is gone. Envelope combines digital envelopes, joint accounts, debit cards, and envelope-based spending controls into one checking account, with early direct deposit, mobile check deposit, ATM access, and a waivable annual fee.

  The cross-platform mobile app is built with Skip Lite from a single Swift codebase, with iOS-native frameworks for payments and identity (Stripe, Stytch, Plaid, VGS, Sentry) integrated alongside the shared budgeting and banking flows.
