# PROVENANCE
# - Skip-built: open-source App Fair Project app — repo Net-Skip/Net-Skip.
#   Package.swift depends on `https://source.skip.tools/skip.git` and uses the
#   SkipStone build plugin. https://github.com/Net-Skip/Net-Skip
# - Skip mode: SkipLite — Sources/NetSkip/Skip/skip.yml and
#   Sources/NetSkipModel/Skip/skip.yml have no `mode: 'native'` setting, and
#   the Package.swift dependency list uses `skip-ui` (the transpiled UI
#   bridge) rather than `skip-fuse-ui`. Web-view content is bridged through
#   `skip-web` in transpiled-Swift.
name: Net Skip
developer: The App Fair Project Inc
tagline: A minimalist, ad-free, tracking-free web browser
description: |
  Net Skip is a minimal and tasteful web browser focused on speed and privacy. With no ads, no tracking, and no telemetry, the browser delivers a fast, distraction-free browsing experience on both iOS and Android.

  Free, open source, and distributed via App Fair. Built from a single Swift codebase that ships natively on both platforms with Skip.
