name: areoHDR
developer: Areo Info LLC
tagline: Real Mars images in true high dynamic range
description: |
  areoHDR shows images taken only hours ago on the surface of Mars by NASA's Perseverance rover, currently driving in and around Jezero Crater. The app is the first to render the rover's photographs in true high dynamic range and with color calibration tuned for human vision — bringing the experience that human explorers on Mars would have themselves to your iPhone, iPad, or Android device.

  The Android version was ported from the original SwiftUI iOS app with only minor changes using Skip Lite, which transpiles the same Swift codebase to Kotlin and Jetpack Compose.
