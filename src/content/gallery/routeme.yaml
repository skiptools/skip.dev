name: RouteMe
developer: RouteMe Teknoloji Anonim Sirketi
tagline: Discover, share, and follow travel routes
description: |
  RouteMe is a social platform for discovering, creating, and sharing complete travel routes — not just individual spots — that string together a full experience. Build your own custom routes with photos and descriptions, follow favorite creators, and explore a personalized Discover feed of trending paths and category filters.

  Routes can be exported to your preferred navigation app for turn-by-turn directions, and a guest mode lets you browse the community without signing in.
