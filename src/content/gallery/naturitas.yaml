# PROVENANCE
# - Skip-built: Skip blog post "Official Android support in Swift 6.3"
#   describes Naturitas's adoption pattern explicitly: "It is the technique
#   that was adopted by Naturitas and other platforms, as discussed in the
#   excellent 'Android Doesn't Deserve Swift—But We Did It Anyway!' talk."
#   https://skip.dev/blog/swift-6.3-android-support/
#   Talk: https://www.youtube.com/watch?v=EIGl6GOo210
# - Skip mode: partial — the same blog post describes the pattern as
#   "Shared business logic: Use the Swift SDK directly to cross-compile your
#   model layer for Android, and keep the UI native on each platform." This
#   is the partial-Skip pattern (Skip Fuse for the model only, native UI on
#   each platform). The Naturitas Android app is closed-source so the
#   specific Skip configuration cannot be inspected directly.
name: "Naturitas: Natural Health"
developer: Naturitas
tagline: Spain's natural health superstore in your pocket
description: |
  Naturitas brings a catalog of more than 30,000 natural health products into a single mobile shopping experience for both iOS and Android. The catalog spans supplements, organic food, natural cosmetics and hygiene, sports nutrition, mom and baby, home and garden, with featured ranges across vitamins and minerals, probiotics, omega oils, phytotherapy, and natural cosmetics.

  The company sources exclusively from European suppliers under strict sanitary regulations and works directly with brands like Solgar, Lamberts, Solaray, Nutergia, and Weleda. Orders ship in 24-72 hours with 14-day returns, and an expert customer-service team is available for product questions.

  With over 500,000 downloads on the Play Store and a 4.6 average rating from nearly 30,000 reviewers, Naturitas is the largest production deployment publicly known to use Skip technology in its mobile app.
