# PROVENANCE
# - Skip-built: open-source student-chapter project. The dual-platform mobile
#   client lives at `apps/conclave-skip` in https://github.com/ACM-VIT/conclave.
#   Its `Package.swift` is annotated `// This is a Skip (https://skip.tools)
#   package.` and depends on `source.skip.tools/skip.git`, `skip-ui`,
#   `skip-fuse`, `skip-model`, and `skip-kit`. The iOS bundle ID
#   (`com.acmvit.conclave`) matches the Android applicationId and the Skip.env
#   `PRODUCT_BUNDLE_IDENTIFIER`.
# - Skip mode: SkipLite — `Sources/Conclave/Skip/skip.yml` sets
#   `skip: { mode: 'transpiled' }`. (SkipFuse is imported only to provide the
#   `@Observable` bridging required by Compose; the module itself is
#   transpiled.) Platform-specific dependencies (Socket.IO, mediasoup) are
#   wired in via SwiftPM `condition: .when(platforms: [.iOS])` on the iOS
#   side and equivalent Gradle implementations declared in skip.yml on the
#   Android side.
name: Conclave by ACM-VIT
developer: ACM-VIT
tagline: Student-built, in-house video conferencing platform
description: |
  Conclave is ACM-VIT's fully in-house video conferencing platform, designed, built, and maintained by the student chapter to support communication needs across one-on-one discussions and large group meetings. Sign in with Google or Apple, or join as a guest by meeting code or link. Features include high-quality audio and video, in-meeting chat, host controls, meeting lock, waiting-room moderation, and text-to-speech accessibility.

  The mobile client is a single Skip Lite Swift codebase shipping to both iOS and Android, with platform-specific media bindings (Socket.IO and mediasoup) bridged through `skip-kit` and Gradle on the Android side. Conclave is open source at github.com/ACM-VIT/conclave.
