name: LiveTrackz
developer: Four-Four Software Inc.
tagline: Loops & clicktracks for your live sets
description: |
  LiveTrackz gives performing musicians a library of more than 2,000 loops and click tracks for their live sets. Built with worship teams and live bands in mind, the app acts as a reliable timing reference that keeps the whole band in sync, with multitrack control for adjusting individual instrument levels and tailoring the sound of every loop.

  Musicians can create and share setlists with bandmates in real time, join teams through invite links, and submit free requests for loops they can't find in the library. Genre-filtered search and tap-to-start playback make it practical to use on stage, and subscribers can upload their own loops.
