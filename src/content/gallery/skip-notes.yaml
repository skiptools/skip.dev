# PROVENANCE
# - Skip-built: official Skip team app — repo skiptools/Skip-Notes
#   https://github.com/skiptools/Skip-Notes
#   README: "Skip notes is a Skip Fuse dual-platform note taking app built
#   using Skip and distributed through the App Fair." The app is also a
#   reference for SkipBridge.
# - Skip mode: SkipBridge — the project pairs a transpiled SwiftUI module
#   (Sources/SkipNotes/Skip/skip.yml: `mode: 'transpiled'`) with a model
#   module that demonstrates Skip's bidirectional bridging between
#   transpiled-Swift and natively-compiled Swift. The README explicitly
#   names this the SkipBridge demo app.
name: Skip Notes
developer: The App Fair Project Inc
tagline: Secure on-device notes, demonstrating SkipBridge
description: |
  Skip Notes is a simple, secure note-taking app that keeps your notes encrypted on-device. The app demonstrates SkipBridge — Skip's bidirectional Swift/Kotlin bridging system — by sharing a Swift model layer between a SwiftUI iOS app and a Jetpack Compose Android UI.

  Free, open source, and distributed via App Fair on both stores.
