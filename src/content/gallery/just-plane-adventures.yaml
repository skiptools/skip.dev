name: Just Plane Adventures
developer: Floating Axe Head Ministries LLC
tagline: A peaceful mountain oasis in West Virginia
description: |
  Just Plane Adventures is the companion app for a mountain RV park, cabin retreat, and private airstrip in the South Branch Valley of Northeast West Virginia, near Moorefield. The campground offers 34 full-hookup RV sites with water, sewer, and 50/30/20 amp electric, 16 water-and-electric sites, free Wi-Fi, and premium cabins.

  A private airstrip (4WV4) is available for fly-in guests with prior permission, making this a unique destination for pilots and outdoor travelers.
