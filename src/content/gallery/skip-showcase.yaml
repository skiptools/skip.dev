# - Skip mode: SkipFuse — repo name itself ends in "-fuse" (the "-fuse" suffix
#   is the canonical signal that an App Fair / skiptools sample is the
#   native-Fuse variant of the app, paired with `skipapp-showcase` for Lite).
#   The Play Store package `org.appfair.app.Showcase` corresponds to the Fuse
#   build.
name: Skip Showcase
developer: The App Fair Project Inc
tagline: Interactive SwiftUI catalog for iOS and Android
description: |
  Skip Showcase is an interactive catalog of SwiftUI components built with Skip — the cross-platform tool that lets a single Swift codebase ship as native apps on both iOS and Android. On iOS the app runs as a normal SwiftUI app; on Android the same Swift source compiles with the official Swift Android SDK while SkipUI translates SwiftUI views into Jetpack Compose.

  The app exercises UI controls, layout, navigation, graphics, state management, text and media, plus platform integrations like haptics, ShareLink, Map, SQL, Keychain, and WebView. Install on both platforms side-by-side to compare rendering. Open source.
