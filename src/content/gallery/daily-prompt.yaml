name: "Daily Prompt: Writing Prompts"
developer: Daily Prompt Ltd
tagline: A daily writing prompt to build a creative habit
description: |
  Daily Prompt delivers a fresh writing prompt every day across fiction, poetry, short stories, and non-fiction so users can build a steady writing habit in just 15 minutes a day. Premium subscribers unlock 2,000+ prompts, novel-writing tools, unlimited word counts, writing competitions with cash prizes, and the ability to export their work.

  A built-in community lets writers share pieces, leave feedback, and join challenges. Work syncs across iPhone, iPad, Mac, and the web. The Android edition is built with Skip, sharing a Swift codebase with the established iOS app.
