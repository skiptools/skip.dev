# PROVENANCE
# - Skip-built: the Wicked Woods festival app is the production deployment
#   of the open-source `OpenMusicEvent` framework, authored by Woody Melling
#   (`woodymelling`) — a regular contributor to the Skip community
#   discussions (e.g., "Observation Support" thread #661). The
#   OpenMusicEvent framework's README explicitly states: "This is a Skip
#   dual-platform app project."
#   https://github.com/ometools/open-music-event
#   Marketing site: https://openmusicevent.live
# - Skip mode: SkipFuse — the upstream OpenMusicEvent project's
#   Sources/OpenMusicEvent/Skip/skip.yml carries `mode: 'native'`, and the
#   Package.swift uses `skip-fuse-ui` and `skip-bridge`. The Wicked Woods
#   Play Store package (`com.Festivl.WickedWoods`) is a custom build atop
#   the same upstream codebase, so the mode reasonably applies.
name: Wicked Woods
developer: Wicked Woods Music Festival
tagline: The official Wicked Woods festival companion
description: |
  The Wicked Woods app is the official festival companion for Wicked Woods Music Festival in Fairmont, BC. It contains the lineup with set times for each stage, lets users build a personalized schedule, and supports alarm reminders so attendees never miss a favorite artist.

  Real-time festival updates keep attendees informed as events unfold, and built-in maps help navigate the festival and camping grounds — locating vendors, water ports, showers, ANKORS, the Sanctuary women's safe zone, and other amenities.
